<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Anime Prompt Studio — Sign In</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#07090f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">

<meta name="apple-mobile-web-app-title" content="APS">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;font-family:'DM Sans',sans-serif}

body{
  background:#07040f;
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;
}

/* ── canvas bg ── */
#authBg{position:fixed;inset:0;z-index:0;pointer-events:none}

/* ── grid lines ── */
.grid-lines{
  position:fixed;inset:0;z-index:1;pointer-events:none;
  background-image:
    linear-gradient(rgba(99,102,241,.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(99,102,241,.04) 1px,transparent 1px);
  background-size:52px 52px;
}

/* ── petals ── */
@keyframes sakura-fall{
  0%  {transform:translateY(-30px) rotate(0deg) translateX(0);opacity:0}
  8%  {opacity:.85}
  92% {opacity:.55}
  100%{transform:translateY(110vh) rotate(800deg) translateX(40px);opacity:0}
}
.petal{
  position:fixed;top:-20px;pointer-events:none;z-index:2;
  border-radius:50% 0 50% 0;
  animation:sakura-fall linear infinite;
}

/* ── stars ── */
@keyframes twinkle{0%,100%{opacity:.15}50%{opacity:.9}}
.star{position:fixed;border-radius:50%;background:#fff;pointer-events:none;z-index:2}

/* ── rings ── */
@keyframes pulse-ring{
  0%,100%{opacity:.12;transform:translate(-50%,-50%) scale(1)}
  50%{opacity:.28;transform:translate(-50%,-50%) scale(1.06)}
}
.ring{
  position:fixed;border-radius:50%;pointer-events:none;z-index:2;
  top:50%;left:50%;
  border:1px solid rgba(99,102,241,.2);
}
.ring1{width:500px;height:500px;animation:pulse-ring 5s ease-in-out infinite}
.ring2{width:700px;height:700px;animation:pulse-ring 7s ease-in-out infinite reverse;border-color:rgba(244,114,182,.12)}
.ring3{width:900px;height:900px;animation:pulse-ring 9s ease-in-out infinite;border-color:rgba(56,189,248,.08)}

/* ── card ── */
@keyframes slide-up{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}

.auth-wrap{
  position:relative;z-index:10;
  display:flex;flex-direction:column;align-items:center;
  gap:24px;
  animation:slide-up .65s cubic-bezier(.22,.9,.36,1) both;
}

.auth-card{
  width:360px;
  background:rgba(10,7,20,.88);
  border:1px solid rgba(244,114,182,.18);
  border-radius:22px;
  padding:36px 30px 28px;
  backdrop-filter:blur(24px);
  box-shadow:0 24px 64px rgba(0,0,0,.55),0 0 0 1px rgba(244,114,182,.06);
}

/* logo area */
.logo-area{
  display:flex;flex-direction:column;align-items:center;
  gap:14px;margin-bottom:26px;
}
.logo-icon{width:64px;height:64px;object-fit:contain}
.logo-text{height:22px;object-fit:contain}

/* pills */
.pills{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-bottom:22px}
.pill{
  font-size:10.5px;padding:3px 10px;border-radius:20px;
  background:rgba(99,102,241,.1);
  border:1px solid rgba(99,102,241,.18);
  color:#a5b4fc;
  font-weight:500;
}

/* divider */
.auth-div{
  height:1px;
  background:linear-gradient(90deg,transparent,rgba(244,114,182,.18),transparent);
  margin:20px 0;
}

/* google button */
.btn-google{
  width:100%;display:flex;align-items:center;justify-content:center;gap:10px;
  padding:13px 16px;border-radius:13px;
  border:1px solid rgba(255,255,255,.1);
  background:rgba(255,255,255,.05);
  color:#fff;font-size:14px;font-weight:600;
  cursor:pointer;transition:all .2s;
  margin-bottom:10px;font-family:inherit;
}
.btn-google:hover{
  background:rgba(255,255,255,.1);
  border-color:rgba(255,255,255,.2);
  transform:translateY(-1px);
  box-shadow:0 8px 24px rgba(0,0,0,.3);
}
.btn-google:active{transform:translateY(0)}

/* guest button */
.btn-guest{
  width:100%;padding:10px 16px;border-radius:13px;
  border:1px solid rgba(255,255,255,.06);
  background:transparent;
  color:rgba(255,255,255,.35);
  font-size:12.5px;cursor:pointer;font-family:inherit;
  transition:all .2s;
}
.btn-guest:hover{color:rgba(255,255,255,.6);border-color:rgba(255,255,255,.14)}

/* footer */
.auth-footer{
  font-size:10.5px;color:rgba(255,255,255,.2);
  text-align:center;line-height:1.7;margin-top:16px;
}

/* error toast */
.auth-error{
  display:none;
  background:rgba(239,68,68,.12);
  border:1px solid rgba(239,68,68,.25);
  border-radius:10px;
  color:#fca5a5;
  font-size:12px;
  padding:8px 12px;
  text-align:center;
  margin-top:10px;
}

/* loading spinner */
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{
  width:18px;height:18px;
  border:2px solid rgba(255,255,255,.15);
  border-top-color:#fff;
  border-radius:50%;
  animation:spin .7s linear infinite;
  display:none;
}
</style>
</head>

  }
  resize();
  window.addEventListener('resize', resize);

  (function draw(){
    ctx.clearRect(0,0,W,H);
    ORBS.forEach(p => {
      const ox  = Math.sin(t * p.sx + p.px) * .10;
      const oy  = Math.cos(t * p.sy + p.py) * .08;
      const px  = (p.x + ox) * W;
      const py  = (p.y + oy) * H;
      const r   = p.r * Math.max(W, H);
      const hue = p.h + Math.sin(t * .15 + p.px) * 12;
      const g   = ctx.createRadialGradient(px,py,0, px,py,r);
      g.addColorStop(0,   `hsla(${hue},65%,55%,${p.a})`);
      g.addColorStop(.5,  `hsla(${hue},60%,48%,${p.a*.4})`);
      g.addColorStop(1,   `hsla(${hue},55%,40%,0)`);
      ctx.beginPath();
      ctx.arc(px, py, r, 0, Math.PI*2);
      ctx.fillStyle = g;
      ctx.fill();
    });
    t += .006;
    requestAnimationFrame(draw);
  })();
})();

/* ── Sign in / Guest ── */
async function doSignIn(){
  const btn     = document.getElementById('signInBtn');
  const lbl     = document.getElementById('signInLabel');
  const spinner = document.getElementById('signInSpinner');
  const errEl   = document.getElementById('authError');

  btn.disabled  = true;
  lbl.textContent = 'Signing in…';
  spinner.style.display = 'block';
  errEl.style.display   = 'none';

  try {
    await window._fbAuth.signIn();
    /* onAuthStateChanged will redirect */
  } catch(e){
    btn.disabled  = false;
    lbl.textContent = 'Continue with Google';
    spinner.style.display = 'none';
    if(e.code !== 'auth/popup-closed-by-user'){
      errEl.textContent   = e.message || 'Sign in failed. Please try again.';
      errEl.style.display = 'block';
    }
  }
}

function doGuest(){
  sessionStorage.setItem('aps_guest', '1');
  window.location.href = 'index.html';
}
