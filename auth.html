<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Anime Prompt Studio — Sign In</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#07090f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="APS">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&display=swap" rel="stylesheet">

<style>
/* ── Reset ── */
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;font-family:'DM Sans',sans-serif}
body{background:#07040f;display:flex;align-items:center;justify-content:center;min-height:100vh}

/* ── Canvas bg ── */
#authBg{position:fixed;inset:0;z-index:0;pointer-events:none}

/* ── Grid lines ── */
.grid-lines{
  position:fixed;inset:0;z-index:1;pointer-events:none;
  background-image:
    linear-gradient(rgba(99,102,241,.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(99,102,241,.04) 1px,transparent 1px);
  background-size:52px 52px;
}

/* ── Petals keyframe ── */
@keyframes sakura-fall{
  0%  {transform:translateY(-30px) rotate(0deg) translateX(0);opacity:0}
  8%  {opacity:.85}
  92% {opacity:.55}
  100%{transform:translateY(110vh) rotate(800deg) translateX(40px);opacity:0}
}

/* ── Stars keyframe ── */
@keyframes twinkle{0%,100%{opacity:.15}50%{opacity:.9}}

/* ── Pulse rings ── */
@keyframes pulse-ring{
  0%,100%{opacity:.12;transform:translate(-50%,-50%) scale(1)}
  50%{opacity:.28;transform:translate(-50%,-50%) scale(1.06)}
}
.ring{position:fixed;border-radius:50%;pointer-events:none;z-index:2;top:50%;left:50%;border:1px solid rgba(99,102,241,.2)}
.ring1{width:500px;height:500px;animation:pulse-ring 5s ease-in-out infinite}
.ring2{width:700px;height:700px;animation:pulse-ring 7s ease-in-out infinite reverse;border-color:rgba(244,114,182,.12)}
.ring3{width:900px;height:900px;animation:pulse-ring 9s ease-in-out infinite;border-color:rgba(56,189,248,.08)}

/* ── Card slide-in ── */
@keyframes slide-up{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
.auth-wrap{
  position:relative;z-index:10;
  display:flex;flex-direction:column;align-items:center;gap:24px;
  animation:slide-up .65s cubic-bezier(.22,.9,.36,1) both;
}

/* ── Card ── */
.auth-card{
  width:360px;
  background:rgba(10,7,20,.88);
  border:1px solid rgba(244,114,182,.18);
  border-radius:22px;
  padding:36px 30px 28px;
  backdrop-filter:blur(24px);
  box-shadow:0 24px 64px rgba(0,0,0,.55),0 0 0 1px rgba(244,114,182,.06);
}

/* ── Logo area ── */
.logo-area{display:flex;flex-direction:column;align-items:center;gap:14px;margin-bottom:26px}
.logo-icon{width:64px;height:64px;object-fit:contain}
.logo-text{height:22px;object-fit:contain}

/* ── Feature pills ── */
.pills{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-bottom:22px}
.pill{
  font-size:10.5px;padding:3px 10px;border-radius:20px;
  background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.18);
  color:#a5b4fc;font-weight:500;
}

/* ── Divider ── */
.auth-div{height:1px;background:linear-gradient(90deg,transparent,rgba(244,114,182,.18),transparent);margin:20px 0}

/* ── Google button ── */
.btn-google{
  width:100%;display:flex;align-items:center;justify-content:center;gap:10px;
  padding:13px 16px;border-radius:13px;
  border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);
  color:#fff;font-size:14px;font-weight:600;
  cursor:pointer;transition:all .2s;margin-bottom:10px;font-family:inherit;
}
.btn-google:hover{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.2);transform:translateY(-1px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.btn-google:active{transform:translateY(0)}

/* ── Guest button ── */
.btn-guest{
  width:100%;padding:10px 16px;border-radius:13px;
  border:1px solid rgba(255,255,255,.06);background:transparent;
  color:rgba(255,255,255,.35);font-size:12.5px;cursor:pointer;font-family:inherit;transition:all .2s;
}
.btn-guest:hover{color:rgba(255,255,255,.6);border-color:rgba(255,255,255,.14)}

/* ── Footer ── */
.auth-footer{font-size:10.5px;color:rgba(255,255,255,.2);text-align:center;line-height:1.7;margin-top:16px}

/* ── Error toast ── */
.auth-error{
  display:none;background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.25);
  border-radius:10px;color:#fca5a5;font-size:12px;padding:8px 12px;text-align:center;margin-top:10px;
}

/* ── Loading spinner ── */
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{
  width:18px;height:18px;border:2px solid rgba(255,255,255,.15);border-top-color:#fff;
  border-radius:50%;animation:spin .7s linear infinite;display:none;
}
</style>
</head>
<body>

<canvas id="authBg"></canvas>
<div class="grid-lines"></div>
<div class="ring ring1"></div>
<div class="ring ring2"></div>
<div class="ring ring3"></div>
<div id="petals"></div>
<div id="stars"></div>

<div class="auth-wrap">
  <div class="auth-card">

    <div class="logo-area">
      <img class="logo-icon" src="Icon.png" alt="APS icon">
      <img class="logo-text" src="Logo.png" alt="Anime Prompt Studio">
    </div>

    <div class="pills">
      <span class="pill">&#9729; Cloud saves</span>
      <span class="pill">&#9733; Favourites</span>
      <span class="pill">&#128100; Characters</span>
    </div>

    <button class="btn-google" id="signInBtn" onclick="doSignIn()">
      <svg width="18" height="18" viewBox="0 0 24 24" style="flex-shrink:0">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      <span id="signInLabel">Continue with Google</span>
      <div class="spinner" id="signInSpinner"></div>
    </button>

    <button class="btn-guest" onclick="doGuest()">Continue as Guest &nbsp;&#8212;&nbsp; no saving</button>

    <div class="auth-error" id="authError"></div>
    <div class="auth-div"></div>
    <div class="auth-footer">Free forever &nbsp;·&nbsp; No data collected &nbsp;·&nbsp; Runs in your browser</div>

  </div>
</div>

<!-- ── Shared: Firebase (auth redirect handled here) ── -->
<script type="module">
  import { auth, onAuthStateChanged } from './js/firebase.js';
  /* If already logged in → skip straight to the app */
  onAuthStateChanged(auth, function(user){
    if (user) window.location.href = 'index.html';
  });
</script>

<!-- ── Shared: PWA (SW + install button) ── -->
<script src="js/pwa.js"></script>

<!-- ── Shared: Animated background ── -->
<script src="js/bg-effects.js"></script>

<!-- ── Auth page logic ── -->
<script>
async function doSignIn() {
  var btn     = document.getElementById('signInBtn');
  var lbl     = document.getElementById('signInLabel');
  var spinner = document.getElementById('signInSpinner');
  var errEl   = document.getElementById('authError');

  btn.disabled          = true;
  lbl.textContent       = 'Signing in\u2026';
  spinner.style.display = 'block';
  errEl.style.display   = 'none';

  try {
    await window._fbAuth.signIn();
    /* onAuthStateChanged will redirect */
  } catch (e) {
    btn.disabled          = false;
    lbl.textContent       = 'Continue with Google';
    spinner.style.display = 'none';
    if (e.code !== 'auth/popup-closed-by-user') {
      errEl.textContent   = e.message || 'Sign in failed. Please try again.';
      errEl.style.display = 'block';
    }
  }
}

function doGuest() {
  sessionStorage.setItem('aps_guest', '1');
  window.location.href = 'index.html';
}
</script>

</body>
</html>
